<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - APPEC TSS College</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">A</div>
      <h1>APPEC TSS College</h1>
      <p>Staff Login Portal</p>
    </div>
    
    <h2>Sign In to Your Account</h2>
    <p class="subtitle">Enter your institutional email and password to access your dashboard.</p>
    
    <form id="loginForm">
      <div class="error-message" id="loginError"></div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="yourname@appec.edu" required autocomplete="email">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>
      
      <button type="submit" class="btn btn-primary btn-block">Sign In</button>
    </form>
    
    <div class="auth-note">
      <p>Access is restricted to authorized APPEC TSS College staff only.</p>
      <p>Contact the system administrator if you need assistance.</p>
    </div>
    
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
  
  <script src="js/main.js"></script>
</body>
</html>
